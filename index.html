<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Code Viewer Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.css" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1e1e1e;color:#d4d4d4;padding:16px;line-height:1.5}
    .container{max-width:1400px;margin:0 auto}
    .header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#252526;border-radius:6px;margin-bottom:12px;flex-wrap:wrap;gap:10px}
    .file-info{font-size:14px;color:#9cdcfe;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-info a{color:#569cd6;text-decoration:none}
    .file-info a:hover{text-decoration:underline}
    .actions{display:flex;gap:8px}
    .btn{padding:6px 12px;background:#0e639c;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;transition:background.2s}
    .btn:hover{background:#1177bb}
    .btn:disabled{background:#3c3c3c;cursor:not-allowed;opacity:.6}
    .btn-outline{background:transparent;border:1px solid #0e639c}
    .btn-outline:hover{background:#0e639c20}
    
    .analysis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:12px;background:#252526;padding:12px;border-radius:6px}
    .stat-card{text-align:center;padding:10px;border-radius:4px;background:#1e1e1e;border-left:3px solid #569cd6}
    .stat-card.warning{border-left-color:#dcdcaa}
    .stat-card.danger{border-left-color:#f48771}
    .stat-card.success{border-left-color:#4ec9b0}
    .stat-value{font-size:18px;font-weight:600;color:#fff}
    .stat-label{font-size:11px;color:#888;margin-top:4px}
    .stat-sub{font-size:10px;color:#666;margin-top:2px}
    
    .deps{background:#252526;border-radius:6px;padding:10px 14px;margin-bottom:12px}
    .deps-title{font-size:13px;color:#9cdcfe;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .deps-list{display:flex;flex-wrap:wrap;gap:6px}
    .dep-tag{background:#3c3c3c;padding:4px 10px;border-radius:4px;font-size:12px;color:#ce9178;cursor:pointer}
    .dep-tag:hover{background:#4a4a4a}
    .dep-tag.external{color:#4ec9b0}
    .dep-empty{color:#666;font-size:12px;font-style:italic}
    
    /* 🔍 模糊搜索专项分析 */
    .fuse-analysis{background:#252526;border-radius:6px;padding:12px 14px;margin-bottom:12px;display:none}
    .fuse-analysis.show{display:block}
    .fuse-title{font-size:13px;color:#4ec9b0;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .fuse-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
    .fuse-item{background:#1e1e1e;padding:8px 12px;border-radius:4px;font-size:12px}
    .fuse-label{color:#888;margin-bottom:4px}
    .fuse-value{color:#d4d4d4;word-break:break-all}
    .fuse-value.code{font-family:monospace;background:#2d2d2d;padding:2px 6px;border-radius:3px}
    
    .error{background:#5a1d1d;color:#f48771;padding:12px;border-radius:4px;margin-bottom:12px;display:none}
    .loading{text-align:center;padding:30px;color:#888;display:none}
    
    pre{background:#1e1e1e!important;border-radius:6px!important;margin:0!important;box-shadow:0 2px 8px rgba(0,0,0,.3);max-height:65vh;overflow:auto}
    code{font-size:13px!important}
    .prism-toolbar{top:8px!important;right:8px!important}
    .copy-to-clipboard-button{background:#3c3c3c!important;color:#fff!important;border:none!important;padding:4px 10px!important;border-radius:4px!important;font-size:12px!important;cursor:pointer!important}
    .copy-to-clipboard-button:hover{background:#505050!important}
    .copy-to-clipboard-button[data-copy-state="copy-success"]{background:#388a34!important}
    
    @media(max-width:768px){.header{flex-direction:column;align-items:flex-start}.analysis{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:480px){.analysis{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="file-info" id="fileInfo">🔄 初始化...</div>
      <div class="actions">
        <button class="btn btn-outline" id="toggleAnalysis">🔽 隐藏分析</button>
        <button class="btn" id="openGithub" disabled>GitHub</button>
        <button class="btn" id="copyAll" disabled>复制</button>
      </div>
    </div>

    <!-- 基础分析面板 -->
    <div id="analysisPanel">
      <div class="analysis">
        <div class="stat-card"><div class="stat-value" id="statLines">-</div><div class="stat-label">总行数</div></div>
        <div class="stat-card"><div class="stat-value" id="statSize">-</div><div class="stat-label">文件大小</div></div>
        <div class="stat-card warning"><div class="stat-value" id="statComments">-</div><div class="stat-label">注释占比</div><div class="stat-sub" id="commentPercent">0%</div></div>
        <div class="stat-card"><div class="stat-value" id="statFunctions">-</div><div class="stat-label">函数/方法</div></div>
        <div class="stat-card danger"><div class="stat-value" id="statComplexity">-</div><div class="stat-label">复杂度</div><div class="stat-sub" id="complexityLevel">计算中...</div></div>
        <div class="stat-card"><div class="stat-value" id="statImports">-</div><div class="stat-label">依赖模块</div></div>
      </div>

      <!-- 🔍 模糊搜索专项分析 (动态显示) -->
      <div class="fuse-analysis" id="fuseAnalysis">
        <div class="fuse-title">🔍 Fuse.js 模糊搜索配置</div>
        <div class="fuse-grid" id="fuseGrid"></div>
      </div>

      <!-- 依赖列表 -->
      <div class="deps">
        <div class="deps-title">📦 检测到的依赖 <span id="depsCount" style="color:#666;font-size:12px;margin-left:6px"></span></div>
        <div class="deps-list" id="depsList"><span class="dep-empty">分析中...</span></div>
      </div>
    </div>

    <div class="error" id="errorMsg"></div>
    <div class="loading" id="loading">🔄 加载并分析中...</div>
    <pre class="line-numbers" style="display:none;"><code id="codeBlock" class="language-javascript"></code></pre>
  </div>

  <!-- Prism -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

  <script>
    // ====== URL 解析 ======
    function parseGitHubUrl(url) {
      const blobMatch = url.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/(?:blob|tree)\/([^/]+)\/(.+?)(?:#.*)?$/);
      if (blobMatch) {
        const [_, owner, repo, ref, path] = blobMatch;
        return {
          raw: `https://raw.githubusercontent.com/${owner}/${repo}/${ref}/${path}`,
          github: url,
          lang: path.split('.').pop()?.toLowerCase() || 'plaintext',
          filename: path.split('/').pop() || 'file'
        };
      }
      const rawMatch = url.match(/^https?:\/\/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)$/);
      if (rawMatch) {
        const [_, owner, repo, ref, path] = rawMatch;
        return {
          raw: url,
          github: `https://github.com/${owner}/${repo}/blob/${ref}/${path}`,
          lang: path.split('.').pop()?.toLowerCase() || 'plaintext',
          filename: path.split('/').pop() || 'file'
        };
      }
      return null;
    }
    function getUrlParam(name) { return new URLSearchParams(window.location.search).get(name); }

    // ====== 代码分析引擎 ======
    const CodeAnalyzer = {
      safeAnalyze(code, lang) {
        try { return this.analyze(code, lang); }
        catch (e) { console.warn('Analysis fallback:', e); return this.defaultStats(code); }
      },
      defaultStats(code) {
        const lines = code.split('\n').length;
        const bytes = new Blob([code]).size;
        return { totalLines: lines, codeLines: lines, emptyLines: 0, commentLines: 0, commentPercent: 0,
          size: bytes < 1024 ? `${bytes} B` : bytes < 1024*1024 ? `${(bytes/1024).toFixed(1)} KB` : `${(bytes/1024/1024).toFixed(2)} MB`,
          functions: 0, imports: [], complexity: { score: 0, level: '未知', color: '#888' }, fuseConfig: null };
      },
      basicStats(code) {
        const lines = code.split('\n'); let commentLines = 0, codeLines = 0, emptyLines = 0, inBlock = false;
        for (let line of lines) {
          const t = line.trim();
          if (!t) { emptyLines++; continue; }
          if (inBlock) { commentLines++; if (t.includes('*/')) inBlock = false; continue; }
          if (t.startsWith('/*')) { commentLines++; if (!t.includes('*/')) inBlock = true; continue; }
          if (t.startsWith('//') || t.startsWith('#') || t.startsWith('--')) { commentLines++; continue; }
          codeLines++;
        }
        const bytes = new Blob([code]).size;
        return { totalLines: lines.length, codeLines, emptyLines, commentLines,
          commentPercent: lines.length ? Math.round(commentLines / lines.length * 100) : 0,
          size: bytes < 1024 ? `${bytes} B` : bytes < 1024*1024 ? `${(bytes/1024).toFixed(1)} KB` : `${(bytes/1024/1024).toFixed(2)} MB` };
      },
      countFunctions(code) {
        const patterns = [/\bfunction\s+\w+/g, /\b(?:const|let|var)\s+\w+\s*=\s*(?:async\s*)?\(/g, /=>\s*\{?/g, /\bdef\s+\w+/g, /\bfunc\s+\w+/g];
        let count = 0;
        for (const re of patterns) { try { const m = code.match(re); if (m) count += m.length; } catch {} }
        return Math.min(count, Math.round(count * 0.85)) || 0;
      },
      extractImports(code) {
        const deps = new Set();
        const patterns = [/(?:import|from)\s+['"]([^'"]+)['"]/g, /require\s*\(\s*['"]([^'"]+)['"]\s*\)/g, /@readme[\s\S]*?fuse\.js/gi];
        for (const re of patterns) {
          try { let m; while ((m = re.exec(code)) !== null) { if (m[1] && !m[1].startsWith('.')) deps.add(m[1].trim().split(/[\/\s]/)[0]); } } catch {}
        }
        if (/fuse/i.test(code)) deps.add('fuse.js');
        if (/scratch/i.test(code)) deps.add('scratch-vm');
        return Array.from(deps).slice(0, 25);
      },
      estimateComplexity(code) {
        const keywords = ['if','else','for','while','switch','case','catch','&&','||','\\?'];
        let score = 1;
        for (const kw of keywords) { try { const m = code.match(new RegExp(`\\b${kw}\\b`, 'g')); if (m) score += m.length * 0.5; } catch {} }
        let maxDepth = 0, depth = 0;
        for (const ch of code) { if (ch === '{' || ch === '(') { depth++; maxDepth = Math.max(maxDepth, depth); } else if (ch === '}' || ch === ')') depth = Math.max(0, depth - 1); }
        score += maxDepth * 0.7;
        const level = score < 10 ? '低' : score < 25 ? '中' : score < 50 ? '高' : '极高';
        const color = score < 10 ? '#4ec9b0' : score < 25 ? '#dcdcaa' : score < 50 ? '#ce9178' : '#f48771';
        return { score: Math.round(score), level, color };
      },
      // 🔍 Fuse.js 专项分析
      extractFuseConfig(code) {
        const config = {};
        // 检测 Fuse 实例化
        if (/new\s+Fuse\s*\(/i.test(code)) config.hasFuseInstance = true;
        // 提取 threshold
        const threshold = code.match(/threshold\s*:\s*([\d.]+)/i);
        if (threshold) config.threshold = threshold[1];
        // 提取 keys
        const keysMatch = code.match(/keys\s*:\s*\[([^\]]+)\]/i);
        if (keysMatch) config.keys = keysMatch[1].trim();
        // 提取 includeScore
        if (/includeScore\s*:\s*true/i.test(code)) config.includeScore = true;
        // 提取 minMatchCharLength
        const minMatch = code.match(/minMatchCharLength\s*:\s*(\d+)/i);
        if (minMatch) config.minMatchCharLength = minMatch[1];
        // 检测 Scratch 扩展特征
        if (/extensions\.register|getInfo\(\)|opcode/i.test(code)) config.isScratchExtension = true;
        // 提取扩展名称
        const extName = code.match(/name\s*:\s*["']([^"']+)["']/i);
        if (extName) config.extensionName = extName[1];
        // 检测模糊搜索关键词参数
        if (/keyword|searchQuery|query/i.test(code)) config.hasKeywordParam = true;
        return Object.keys(config).length > 0 ? config : null;
      },
      analyze(code, lang) {
        const basic = this.basicStats(code);
        return { ...basic, functions: this.countFunctions(code), imports: this.extractImports(code),
          complexity: this.estimateComplexity(code), fuseConfig: this.extractFuseConfig(code) };
      }
    };

    // ====== 渲染分析结果 ======
    function renderAnalysis(data) {
      document.getElementById('statLines').textContent = data.totalLines?.toLocaleString() || '-';
      document.getElementById('statSize').textContent = data.size || '-';
      document.getElementById('statComments').textContent = `${data.commentPercent || 0}%`;
      document.getElementById('commentPercent').textContent = `注释 ${data.commentLines || 0} 行`;
      document.getElementById('statFunctions').textContent = data.functions ?? '-';
      const cx = data.complexity || {};
      document.getElementById('statComplexity').textContent = cx.score ?? '-';
      const levelEl = document.getElementById('complexityLevel');
      levelEl.textContent = cx.level || '未知';
      levelEl.style.color = cx.color || '#888';
      document.getElementById('statImports').textContent = (data.imports?.length || 0).toString();
      
      // 依赖列表
      const depsList = document.getElementById('depsList'), depsCount = document.getElementById('depsCount');
      depsList.innerHTML = '';
      if (data.imports?.length > 0) {
        depsCount.textContent = `(${data.imports.length})`;
        data.imports.forEach(dep => {
          const tag = document.createElement('span');
          tag.className = `dep-tag ${dep.includes('/') || dep.startsWith('@') ? 'external' : ''}`;
          tag.textContent = dep;
          tag.onclick = () => window.open(`https://www.npmjs.com/package/${dep.replace('@','').split('/')[0]}`, '_blank');
          depsList.appendChild(tag);
        });
      } else { depsCount.textContent = '(0)'; depsList.innerHTML = '<span class="dep-empty">未检测到外部依赖</span>'; }
      
      // 🔍 Fuse 专项分析
      const fuseBox = document.getElementById('fuseAnalysis'), fuseGrid = document.getElementById('fuseGrid');
      fuseGrid.innerHTML = '';
      if (data.fuseConfig) {
        fuseBox.classList.add('show');
        const items = [
          { label: 'Fuse 实例', value: data.fuseConfig.hasFuseInstance ? '✅ 已检测到' : '❌ 未检测到', success: data.fuseConfig.hasFuseInstance },
          { label: '阈值 threshold', value: data.fuseConfig.threshold || '默认 (0.6)', code: !!data.fuseConfig.threshold },
          { label: '搜索 keys', value: data.fuseConfig.keys || '未配置', code: !!data.fuseConfig.keys },
          { label: '返回匹配度', value: data.fuseConfig.includeScore ? '✅ 是' : '❌ 否', success: data.fuseConfig.includeScore },
          { label: '最小匹配长度', value: data.fuseConfig.minMatchCharLength || '默认 (1)', code: !!data.fuseConfig.minMatchCharLength },
          { label: 'Scratch 扩展', value: data.fuseConfig.isScratchExtension ? '✅ 是' : '❌ 否', success: data.fuseConfig.isScratchExtension },
          { label: '扩展名称', value: data.fuseConfig.extensionName || '-', code: !!data.fuseConfig.extensionName },
          { label: '关键词参数', value: data.fuseConfig.hasKeywordParam ? '✅ 支持' : '❌ 未检测到', success: data.fuseConfig.hasKeywordParam }
        ];
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'fuse-item';
          div.innerHTML = `<div class="fuse-label">${item.label}</div><div class="fuse-value${item.code?' code':''}" style="${item.success?'color:#4ec9b0':''}">${item.value}</div>`;
          fuseGrid.appendChild(div);
        });
      } else { fuseBox.classList.remove('show'); }
    }

    // ====== 主逻辑 ======
    async function loadCode() {
      const url = getUrlParam('url');
      const errorEl = document.getElementById('errorMsg'), loading = document.getElementById('loading');
      const codeBlock = document.getElementById('codeBlock'), pre = codeBlock.parentElement;
      const fileInfo = document.getElementById('fileInfo'), openBtn = document.getElementById('openGithub');
      const copyAllBtn = document.getElementById('copyAll'), toggleBtn = document.getElementById('toggleAnalysis');
      const analysisPanel = document.getElementById('analysisPanel');

      if (!url) { errorEl.textContent = '❌ 缺少 url 参数\n示例: ?url=https://github.com/owner/repo/blob/main/file.js'; errorEl.style.display = 'block'; loading.style.display = 'none'; return; }
      const info = parseGitHubUrl(url);
      if (!info) { errorEl.textContent = '❌ 不支持的链接格式'; errorEl.style.display = 'block'; loading.style.display = 'none'; return; }

      fileInfo.innerHTML = `📄 <a href="${info.github}" target="_blank">${info.filename}</a>`;
      openBtn.onclick = () => window.open(info.github, '_blank'); openBtn.disabled = false; toggleBtn.disabled = false;
      loading.style.display = 'block'; pre.style.display = 'none'; analysisPanel.style.display = 'block';

      try {
        const res = await fetch(info.raw, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const code = await res.text();

        codeBlock.textContent = code; codeBlock.className = `language-${info.lang}`;
        Prism.highlightElement(codeBlock); if (Prism.plugins.lineNumbers) Prism.plugins.lineNumbers.resize(pre);

        const analysis = CodeAnalyzer.safeAnalyze(code, info.lang); renderAnalysis(analysis);

        pre.style.display = 'block'; copyAllBtn.disabled = false;
        copyAllBtn.onclick = async () => { try { await navigator.clipboard.writeText(code); copyAllBtn.textContent = '✓'; setTimeout(() => copyAllBtn.textContent = '复制', 1200); } catch { alert('复制失败'); } };

        let visible = true; toggleBtn.onclick = () => { visible = !visible; analysisPanel.style.display = visible ? 'block' : 'none'; toggleBtn.textContent = visible ? '🔽 隐藏分析' : '📊 显示分析'; };
      } catch (e) { console.error('Load error:', e); errorEl.textContent = `❌ 加载失败: ${e.message}`; errorEl.style.display = 'block'; renderAnalysis(CodeAnalyzer.defaultStats('')); }
      finally { loading.style.display = 'none'; }
    }
    document.addEventListener('DOMContentLoaded', loadCode);
  </script>
</body>
</html>
