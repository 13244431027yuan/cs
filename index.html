<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Code Viewer</title>
  <!-- Prism 核心样式 -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
  <!-- Toolbar 样式 -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e; color: #d4d4d4;
      padding: 20px; line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: #252526; border-radius: 6px;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .file-info { font-size: 14px; color: #9cdcfe; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-info a { color: #569cd6; text-decoration: none; }
    .file-info a:hover { text-decoration: underline; }
    .actions { display: flex; gap: 8px; }
    .btn {
      padding: 6px 12px; background: #0e639c; color: white;
      border: none; border-radius: 4px; cursor: pointer;
      font-size: 13px; transition: background 0.2s;
    }
    .btn:hover { background: #1177bb; }
    .btn:disabled { background: #3c3c3c; cursor: not-allowed; }
    .error {
      background: #5a1d1d; color: #f48771; padding: 12px;
      border-radius: 4px; margin-bottom: 16px; display: none;
    }
    .loading { text-align: center; padding: 40px; color: #888; display: none; }
    /* Prism 代码块容器 */
    pre {
      background: #1e1e1e !important; border-radius: 6px !important;
      margin: 0 !important; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    code { font-size: 14px !important; }
    /* 复制按钮样式优化 */
    .prism-toolbar { top: 8px !important; right: 8px !important; }
    .copy-to-clipboard-button {
      background: #3c3c3c !important; color: #fff !important;
      border: none !important; padding: 4px 10px !important;
      border-radius: 4px !important; font-size: 12px !important;
      cursor: pointer !important; transition: background 0.2s !important;
    }
    .copy-to-clipboard-button:hover { background: #505050 !important; }
    .copy-to-clipboard-button[data-copy-state="copy-success"] {
      background: #388a34 !important;
    }
    /* 响应式 */
    @media (max-width: 600px) {
      .header { flex-direction: column; align-items: flex-start; }
      .file-info { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="file-info" id="fileInfo">等待加载...</div>
      <div class="actions">
        <button class="btn" id="openGithub" disabled>在 GitHub 打开</button>
        <button class="btn" id="copyAll" disabled>复制全部</button>
      </div>
    </div>
    <div class="error" id="errorMsg"></div>
    <div class="loading" id="loading">🔄 加载中...</div>
    <pre class="line-numbers" style="display:none;"><code id="codeBlock" class="language-javascript"></code></pre>
  </div>

  <!-- Prism 核心 + 语言 + 插件 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

  <script>
    // 解析 GitHub URL → raw 链接 + 语言
    function parseGitHubUrl(url) {
      const patterns = [
        // github.com/owner/repo/blob/branch/path
        /^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)$/,
        // github.com/owner/repo/blob/branch/path#L10-L20
        /^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)#.*$/,
      ];
      for (const re of patterns) {
        const m = url.match(re);
        if (m) {
          const [_, owner, repo, ref, path] = m;
          return {
            raw: `https://raw.githubusercontent.com/${owner}/${repo}/${ref}/${path}`,
            github: `https://github.com/${owner}/${repo}/blob/${ref}/${path}`,
            lang: path.split('.').pop()?.toLowerCase() || 'plaintext',
            filename: path.split('/').pop()
          };
        }
      }
      // 直接 raw 链接
      if (url.includes('raw.githubusercontent.com')) {
        const parts = url.split('/');
        const filename = parts.pop();
        return {
          raw: url,
          github: url.replace('raw.githubusercontent.com', 'github.com').replace(/\/raw\/[^/]+\/[^/]+\/[^/]+\//, '/blob/'),
          lang: filename.split('.').pop()?.toLowerCase() || 'plaintext',
          filename
        };
      }
      return null;
    }

    // 获取 URL 参数
    function getUrlParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    // 主逻辑
    async function loadCode() {
      const url = getUrlParam('url');
      const errorEl = document.getElementById('errorMsg');
      const loading = document.getElementById('loading');
      const codeBlock = document.getElementById('codeBlock');
      const pre = codeBlock.parentElement;
      const fileInfo = document.getElementById('fileInfo');
      const openBtn = document.getElementById('openGithub');
      const copyAllBtn = document.getElementById('copyAll');

      if (!url) {
        errorEl.textContent = '❌ 缺少 url 参数，示例: ?url=https://github.com/owner/repo/blob/main/file.js';
        errorEl.style.display = 'block';
        return;
      }

      const info = parseGitHubUrl(url);
      if (!info) {
        errorEl.textContent = '❌ 不支持的 GitHub 链接格式';
        errorEl.style.display = 'block';
        return;
      }

      // 更新 UI
      fileInfo.innerHTML = `📄 <a href="${info.github}" target="_blank">${info.filename}</a>`;
      openBtn.href = info.github;
      openBtn.disabled = false;
      loading.style.display = 'block';
      pre.style.display = 'none';

      try {
        const res = await fetch(info.raw);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const code = await res.text();

        // 设置代码和语言
        codeBlock.textContent = code;
        codeBlock.className = `language-${info.lang}`;
        
        // 高亮 + 行号
        Prism.highlightElement(codeBlock);
        Prism.plugins.lineNumbers.resize(codeBlock.parentElement);

        // 显示
        pre.style.display = 'block';
        copyAllBtn.disabled = false;

        // 复制全部按钮
        copyAllBtn.onclick = async () => {
          try {
            await navigator.clipboard.writeText(code);
            const old = copyAllBtn.textContent;
            copyAllBtn.textContent = '✓ 已复制';
            setTimeout(() => copyAllBtn.textContent = old, 1500);
          } catch {
            alert('复制失败，请手动选择复制');
          }
        };

      } catch (e) {
        errorEl.textContent = `❌ 加载失败: ${e.message}\n可能原因: 文件不存在 / 仓库私有 / CORS 限制`;
        errorEl.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', loadCode);
  </script>
</body>
</html>
