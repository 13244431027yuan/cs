<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Code Viewer Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e; color: #d4d4d4; padding: 16px; line-height: 1.5;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: #252526; border-radius: 6px;
      margin-bottom: 12px; flex-wrap: wrap; gap: 10px;
    }
    .file-info { font-size: 14px; color: #9cdcfe; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
    .file-info a { color: #569cd6; text-decoration: none; }
    .file-info a:hover { text-decoration: underline; }
    .actions { display: flex; gap: 8px; align-items: center; }
    .btn {
      padding: 6px 12px; background: #0e639c; color: white;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
      transition: background 0.2s;
    }
    .btn:hover { background: #1177bb; }
    .btn:disabled { background: #3c3c3c; cursor: not-allowed; opacity: 0.6; }
    .btn-outline { background: transparent; border: 1px solid #0e639c; }
    .btn-outline:hover { background: #0e639c20; }
    
    /* 🔍 搜索栏 */
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap;
    }
    .search-input {
      flex: 1; min-width: 200px; padding: 8px 12px; background: #252526;
      border: 1px solid #3c3c3c; border-radius: 4px; color: #d4d4d4;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #0e639c; }
    .search-input::placeholder { color: #666; }
    .search-info { font-size: 12px; color: #888; min-width: 120px; text-align: right; }
    .search-nav { display: flex; gap: 4px; }
    .search-nav button {
      padding: 6px 10px; background: #252526; border: 1px solid #3c3c3c;
      border-radius: 4px; color: #d4d4d4; cursor: pointer; font-size: 12px;
    }
    .search-nav button:hover { background: #3c3c3c; }
    .search-nav button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 分析面板 */
    .analysis {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px; margin-bottom: 12px; background: #252526;
      padding: 12px; border-radius: 6px;
    }
    .stat-card {
      text-align: center; padding: 10px; border-radius: 4px;
      background: #1e1e1e; border-left: 3px solid #569cd6;
    }
    .stat-card.warning { border-left-color: #dcdcaa; }
    .stat-card.danger { border-left-color: #f48771; }
    .stat-value { font-size: 18px; font-weight: 600; color: #fff; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
    .stat-sub { font-size: 10px; color: #666; margin-top: 2px; }

    .deps {
      background: #252526; border-radius: 6px; padding: 10px 14px;
      margin-bottom: 12px;
    }
    .deps-title { font-size: 13px; color: #9cdcfe; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .deps-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .dep-tag {
      background: #3c3c3c; padding: 4px 10px; border-radius: 4px;
      font-size: 12px; color: #ce9178; cursor: pointer;
    }
    .dep-tag:hover { background: #4a4a4a; }
    .dep-tag.external { color: #4ec9b0; }
    .dep-empty { color: #666; font-size: 12px; font-style: italic; }

    .error {
      background: #5a1d1d; color: #f48771; padding: 12px;
      border-radius: 4px; margin-bottom: 12px; display: none;
    }
    .loading { text-align: center; padding: 30px; color: #888; display: none; }

    /* 🔍 搜索结果高亮 */
    .search-match {
      background: rgba(255, 215, 0, 0.3);
      border-radius: 2px;
      box-shadow: 0 0 0 1px rgba(255, 215, 0, 0.5);
    }
    .search-match.active {
      background: rgba(255, 215, 0, 0.6);
      box-shadow: 0 0 0 2px #ffd700;
    }
    
    pre {
      background: #1e1e1e !important; border-radius: 6px !important;
      margin: 0 !important; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      max-height: 60vh; overflow: auto; position: relative;
    }
    code { font-size: 13px !important; }
    .prism-toolbar { top: 8px !important; right: 8px !important; }
    .copy-to-clipboard-button {
      background: #3c3c3c !important; color: #fff !important;
      border: none !important; padding: 4px 10px !important;
      border-radius: 4px !important; font-size: 12px !important;
      cursor: pointer !important;
    }
    .copy-to-clipboard-button:hover { background: #505050 !important; }
    .copy-to-clipboard-button[data-copy-state="copy-success"] { background: #388a34 !important; }

    @media (max-width: 768px) {
      .header { flex-direction: column; align-items: flex-start; }
      .file-info { max-width: 100%; }
      .analysis { grid-template-columns: repeat(2, 1fr); }
      .search-bar { flex-direction: column; align-items: stretch; }
      .search-info { text-align: left; }
    }
    @media (max-width: 480px) {
      .analysis { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="file-info" id="fileInfo">🔄 初始化...</div>
      <div class="actions">
        <button class="btn btn-outline" id="toggleAnalysis">🔽 隐藏分析</button>
        <button class="btn" id="openGithub" disabled>GitHub</button>
        <button class="btn" id="copyAll" disabled>复制</button>
      </div>
    </div>

    <!-- 🔍 搜索栏 -->
    <div class="search-bar" id="searchBar" style="display:none;">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索代码 (支持模糊匹配)..." autocomplete="off">
      <div class="search-nav">
        <button id="searchPrev" disabled>↑ 上一个</button>
        <button id="searchNext" disabled>↓ 下一个</button>
      </div>
      <div class="search-info" id="searchInfo">0/0</div>
      <button class="btn btn-outline" id="searchClear" style="padding:6px 10px;font-size:12px;">✕ 清除</button>
    </div>

    <!-- 分析面板 -->
    <div id="analysisPanel">
      <div class="analysis">
        <div class="stat-card"><div class="stat-value" id="statLines">-</div><div class="stat-label">总行数</div></div>
        <div class="stat-card"><div class="stat-value" id="statSize">-</div><div class="stat-label">文件大小</div></div>
        <div class="stat-card warning"><div class="stat-value" id="statComments">-</div><div class="stat-label">注释占比</div><div class="stat-sub" id="commentPercent">0%</div></div>
        <div class="stat-card"><div class="stat-value" id="statFunctions">-</div><div class="stat-label">函数/方法</div></div>
        <div class="stat-card danger"><div class="stat-value" id="statComplexity">-</div><div class="stat-label">复杂度</div><div class="stat-sub" id="complexityLevel">计算中...</div></div>
        <div class="stat-card"><div class="stat-value" id="statImports">-</div><div class="stat-label">依赖模块</div></div>
      </div>
      <div class="deps">
        <div class="deps-title">📦 检测到的依赖 <span id="depsCount" style="color:#666;font-size:12px;margin-left:6px"></span></div>
        <div class="deps-list" id="depsList"><span class="dep-empty">分析中...</span></div>
      </div>
    </div>

    <div class="error" id="errorMsg"></div>
    <div class="loading" id="loading">🔄 加载并分析中...</div>
    <pre class="line-numbers" style="display:none;"><code id="codeBlock" class="language-javascript"></code></pre>
  </div>

  <!-- Prism -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

  <script>
    // ====== URL 解析 ======
    function parseGitHubUrl(url) {
      const blobMatch = url.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/(?:blob|tree)\/([^/]+)\/(.+?)(?:#.*)?$/);
      if (blobMatch) {
        const [_, owner, repo, ref, path] = blobMatch;
        return {
          raw: `https://raw.githubusercontent.com/${owner}/${repo}/${ref}/${path}`,
          github: url,
          lang: path.split('.').pop()?.toLowerCase() || 'plaintext',
          filename: path.split('/').pop() || 'file'
        };
      }
      const rawMatch = url.match(/^https?:\/\/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)$/);
      if (rawMatch) {
        const [_, owner, repo, ref, path] = rawMatch;
        return {
          raw: url,
          github: `https://github.com/${owner}/${repo}/blob/${ref}/${path}`,
          lang: path.split('.').pop()?.toLowerCase() || 'plaintext',
          filename: path.split('/').pop() || 'file'
        };
      }
      return null;
    }
    function getUrlParam(name) { return new URLSearchParams(window.location.search).get(name); }

    // ====== 🔍 轻量模糊搜索引擎 (Fuse 原理简化版) ======
    const FuzzySearch = {
      // 计算两个字符串的相似度 (0-1)
      similarity(a, b) {
        if (!a || !b) return 0;
        a = a.toLowerCase(); b = b.toLowerCase();
        if (a === b) return 1;
        if (a.includes(b) || b.includes(a)) return 0.9;
        
        // 简化编辑距离
        const len1 = a.length, len2 = b.length;
        if (Math.abs(len1 - len2) > 3) return 0;
        
        let matches = 0, pos = 0;
        for (let ch of b) {
          const idx = a.indexOf(ch, pos);
          if (idx !== -1) { matches++; pos = idx + 1; }
        }
        return matches / Math.max(len1, len2);
      },
      
      // 搜索文本，返回匹配位置
      search(text, query, options = {}) {
        const { threshold = 0.4, findAll = true, minMatchLen = 2 } = options;
        const results = [];
        const lines = text.split('\n');
        const q = query.trim().toLowerCase();
        
        if (!q) return [];
        
        lines.forEach((line, lineIdx) => {
          const lower = line.toLowerCase();
          // 1. 精确子串匹配
          let idx = lower.indexOf(q);
          if (idx !== -1) {
            results.push({ line: lineIdx + 1, start: idx, end: idx + q.length, score: 1, text: line });
            if (!findAll) return;
          }
          // 2. 模糊匹配：滑动窗口
          if (q.length >= minMatchLen) {
            for (let i = 0; i <= line.length - minMatchLen; i++) {
              const substr = line.slice(i, i + q.length);
              const sim = this.similarity(substr, query);
              if (sim >= threshold) {
                // 避免重复添加
                if (!results.some(r => r.line === lineIdx + 1 && Math.abs(r.start - i) < q.length)) {
                  results.push({ line: lineIdx + 1, start: i, end: i + q.length, score: sim, text: line });
                }
              }
            }
          }
        });
        
        // 按分数排序
        return results.sort((a, b) => b.score - a.score || a.line - b.line);
      },
      
      // 高亮匹配文本
      highlight(line, start, end, active = false) {
        const before = line.slice(0, start);
        const match = line.slice(start, end);
        const after = line.slice(end);
        return `${before}<mark class="search-match${active?' active':''}">${match}</mark>${after}`;
      }
    };

    // ====== 代码分析引擎 ======
    const CodeAnalyzer = {
      safeAnalyze(code, lang) {
        try { return this.analyze(code, lang); }
        catch (e) { console.warn('Analysis fallback:', e); return this.defaultStats(code); }
      },
      defaultStats(code) {
        const lines = code.split('\n').length;
        const bytes = new Blob([code]).size;
        return {
          totalLines: lines, codeLines: lines, emptyLines: 0, commentLines: 0, commentPercent: 0,
          size: bytes < 1024 ? `${bytes} B` : bytes < 1024*1024 ? `${(bytes/1024).toFixed(1)} KB` : `${(bytes/1024/1024).toFixed(2)} MB`,
          functions: 0, imports: [], complexity: { score: 0, level: '未知', color: '#888' }
        };
      },
      basicStats(code) {
        const lines = code.split('\n');
        const totalLines = lines.length;
        let commentLines = 0, codeLines = 0, emptyLines = 0, inBlock = false;
        for (let line of lines) {
          const t = line.trim();
          if (!t) { emptyLines++; continue; }
          if (inBlock) { commentLines++; if (t.includes('*/')) inBlock = false; continue; }
          if (t.startsWith('/*')) { commentLines++; if (!t.includes('*/')) inBlock = true; continue; }
          if (t.startsWith('//') || t.startsWith('#') || t.startsWith('--')) { commentLines++; continue; }
          codeLines++;
        }
        const bytes = new Blob([code]).size;
        return {
          totalLines, codeLines, emptyLines, commentLines,
          commentPercent: totalLines ? Math.round(commentLines/totalLines*100) : 0,
          size: bytes < 1024 ? `${bytes} B` : bytes < 1024*1024 ? `${(bytes/1024).toFixed(1)} KB` : `${(bytes/1024/1024).toFixed(2)} MB`
        };
      },
      countFunctions(code, lang) {
        const patterns = {
          javascript: [/\bfunction\s+\w+/g, /\b(?:const|let|var)\s+\w+\s*=\s*(?:async\s*)?\(/g],
          python: [/\bdef\s+\w+/g], java: [/\b\w+\s+\w+\s*\([^)]*\)\s*\{?/g],
          php: [/\bfunction\s+\w+/g], go: [/\bfunc\s+(?:\([^)]+\)\s+)?\w+/g]
        };
        let count = 0;
        for (const re of (patterns[lang]||patterns.javascript)) {
          try { const m = code.match(re); if (m) count += m.length; } catch {}
        }
        return Math.min(count, Math.round(count*0.85)) || 0;
      },
      extractImports(code, lang) {
        const deps = new Set();
        const patterns = {
          javascript: [/(?:import|from)\s+['"]([^'"]+)['"]/g, /require\s*\(\s*['"]([^'"]+)['"]\s*\)/g],
          python: [/^\s*import\s+(\w+)/gm, /^\s*from\s+(\w+)(?:\.\w+)*\s+import/gm]
        };
        for (const re of (patterns[lang]||patterns.javascript)) {
          try {
            let m; while ((m = re.exec(code)) !== null) {
              if (m[1]?.trim() && !m[1].startsWith('.')) deps.add(m[1].trim().split(/[\/\s]/)[0]);
            }
          } catch {}
        }
        return Array.from(deps).slice(0, 25);
      },
      estimateComplexity(code) {
        const kws = ['if','else','for','while','switch','case','catch','&&','||','\\?'];
        let score = 1;
        for (const kw of kws) {
          try { const m = code.match(new RegExp(`\\b${kw}\\b`,'g')); if (m) score += m.length*0.5; } catch {}
        }
        let maxD=0, d=0;
        for (const c of code) { if(c==='{'||c==='('){d++;maxD=Math.max(maxD,d);} else if(c==='}'||c===')') d=Math.max(0,d-1); }
        score += maxD*0.7;
        const level = score<10?'低':score<25?'中':score<50?'高':'极高';
        const color = score<10?'#4ec9b0':score<25?'#dcdcaa':score<50?'#ce9178':'#f48771';
        return { score: Math.round(score), level, color };
      },
      analyze(code, lang) {
        const b = this.basicStats(code);
        return { ...b, functions: this.countFunctions(code,lang), imports: this.extractImports(code,lang), complexity: this.estimateComplexity(code) };
      }
    };

    // ====== 渲染分析结果 ======
    function renderAnalysis(data) {
      document.getElementById('statLines').textContent = data.totalLines?.toLocaleString()||'-';
      document.getElementById('statSize').textContent = data.size||'-';
      document.getElementById('statComments').textContent = `${data.commentPercent||0}%`;
      document.getElementById('commentPercent').textContent = `注释 ${data.commentLines||0} 行`;
      document.getElementById('statFunctions').textContent = data.functions??'-';
      const cx = data.complexity||{};
      document.getElementById('statComplexity').textContent = cx.score??'-';
      const lv = document.getElementById('complexityLevel');
      lv.textContent = cx.level||'未知'; lv.style.color = cx.color||'#888';
      document.getElementById('statImports').textContent = (data.imports?.length||0).toString();
      const depsList = document.getElementById('depsList'), depsCount = document.getElementById('depsCount');
      depsList.innerHTML = '';
      if (data.imports?.length > 0) {
        depsCount.textContent = `(${data.imports.length})`;
        data.imports.forEach(dep => {
          const tag = document.createElement('span');
          tag.className = `dep-tag ${dep.includes('/')||dep.startsWith('@')?'external':''}`;
          tag.textContent = dep; tag.title = '点击搜索';
          tag.onclick = () => window.open(`https://www.npmjs.com/package/${dep.replace('@','').split('/')[0]}`,'_blank');
          depsList.appendChild(tag);
        });
      } else { depsCount.textContent='(0)'; depsList.innerHTML='<span class="dep-empty">未检测到外部依赖</span>'; }
    }

    // ====== 🔍 搜索功能 ======
    let searchState = { code: '', lines: [], matches: [], currentIndex: -1, query: '' };
    
    function initSearch(code) {
      searchState = { code, lines: code.split('\n'), matches: [], currentIndex: -1, query: '' };
      document.getElementById('searchBar').style.display = 'flex';
      document.getElementById('searchInput').value = '';
      updateSearchInfo();
    }
    
    function doSearch(query) {
      if (!query.trim()) { clearSearch(); return; }
      searchState.query = query;
      searchState.matches = FuzzySearch.search(searchState.code, query, { threshold: 0.5, minMatchLen: 2 });
      searchState.currentIndex = searchState.matches.length > 0 ? 0 : -1;
      renderSearchResults();
      updateSearchInfo();
      updateNavButtons();
      if (searchState.currentIndex >= 0) scrollToMatch(searchState.currentIndex);
    }
    
    function renderSearchResults() {
      const codeBlock = document.getElementById('codeBlock');
      const lines = searchState.lines.map((line, idx) => {
        const matches = searchState.matches.filter(m => m.line === idx + 1);
        if (matches.length === 0) return escapeHtml(line);
        // 简单处理：高亮第一个匹配（实际可优化为多匹配）
        const m = matches[0];
        const isActive = searchState.currentIndex >= 0 && searchState.matches[searchState.currentIndex]?.line === idx + 1;
        return FuzzySearch.highlight(escapeHtml(line), m.start, m.end, isActive);
      });
      // 保留 Prism 语言类名，重新高亮
      const lang = codeBlock.className.replace('language-','');
      codeBlock.innerHTML = lines.join('\n');
      codeBlock.className = `language-${lang}`;
      Prism.highlightElement(codeBlock);
    }
    
    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    
    function updateSearchInfo() {
      const total = searchState.matches.length;
      const current = searchState.currentIndex >= 0 ? searchState.currentIndex + 1 : 0;
      document.getElementById('searchInfo').textContent = total > 0 ? `${current}/${total}` : '0/0';
    }
    
    function updateNavButtons() {
      const hasMatches = searchState.matches.length > 0;
      document.getElementById('searchPrev').disabled = !hasMatches;
      document.getElementById('searchNext').disabled = !hasMatches;
    }
    
    function nextMatch(step) {
      if (searchState.matches.length === 0) return;
      searchState.currentIndex = (searchState.currentIndex + step + searchState.matches.length) % searchState.matches.length;
      renderSearchResults();
      updateSearchInfo();
      scrollToMatch(searchState.currentIndex);
    }
    
    function scrollToMatch(idx) {
      const match = searchState.matches[idx];
      if (!match) return;
      const pre = document.querySelector('pre');
      const lineHeight = 20; // 估算
      pre.scrollTop = Math.max(0, (match.line - 3) * lineHeight);
    }
    
    function clearSearch() {
      searchState.matches = []; searchState.currentIndex = -1; searchState.query = '';
      document.getElementById('searchInput').value = '';
      // 恢复原始代码
      const codeBlock = document.getElementById('codeBlock');
      codeBlock.textContent = searchState.code;
      Prism.highlightElement(codeBlock);
      updateSearchInfo(); updateNavButtons();
    }

    // ====== 主逻辑 ======
    async function loadCode() {
      const url = getUrlParam('url');
      const errorEl = document.getElementById('errorMsg');
      const loading = document.getElementById('loading');
      const codeBlock = document.getElementById('codeBlock');
      const pre = codeBlock.parentElement;
      const fileInfo = document.getElementById('fileInfo');
      const openBtn = document.getElementById('openGithub');
      const copyAllBtn = document.getElementById('copyAll');
      const toggleBtn = document.getElementById('toggleAnalysis');
      const analysisPanel = document.getElementById('analysisPanel');
      const searchInput = document.getElementById('searchInput');

      if (!url) {
        errorEl.textContent = '❌ 缺少 url 参数\n示例: ?url=https://github.com/owner/repo/blob/main/file.js';
        errorEl.style.display = 'block'; loading.style.display = 'none'; return;
      }
      const info = parseGitHubUrl(url);
      if (!info) {
        errorEl.textContent = '❌ 不支持的链接格式'; errorEl.style.display = 'block'; loading.style.display = 'none'; return;
      }

      fileInfo.innerHTML = `📄 <a href="${info.github}" target="_blank">${info.filename}</a>`;
      openBtn.onclick = () => window.open(info.github, '_blank'); openBtn.disabled = false; toggleBtn.disabled = false;
      loading.style.display = 'block'; pre.style.display = 'none'; analysisPanel.style.display = 'block';

      try {
        const res = await fetch(info.raw, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const code = await res.text();

        // 代码高亮
        codeBlock.textContent = code; codeBlock.className = `language-${info.lang}`;
        Prism.highlightElement(codeBlock);
        if (Prism.plugins.lineNumbers) Prism.plugins.lineNumbers.resize(pre);

        // 分析 + 搜索初始化
        const analysis = CodeAnalyzer.safeAnalyze(code, info.lang);
        renderAnalysis(analysis);
        initSearch(code);

        // 显示
        pre.style.display = 'block'; copyAllBtn.disabled = false;

        // 复制
        copyAllBtn.onclick = async () => {
          try { await navigator.clipboard.writeText(code); copyAllBtn.textContent='✓'; setTimeout(()=>copyAllBtn.textContent='复制',1200); }
          catch { alert('复制失败'); }
        };

        // 切换分析
        let analysisVisible = true;
        toggleBtn.onclick = () => {
          analysisVisible = !analysisVisible;
          analysisPanel.style.display = analysisVisible ? 'block' : 'none';
          toggleBtn.textContent = analysisVisible ? '🔽 隐藏分析' : '📊 显示分析';
        };

        // 🔍 搜索事件
        let searchTimer;
        searchInput.addEventListener('input', (e) => {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(() => doSearch(e.target.value), 150);
        });
        searchInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.shiftKey ? nextMatch(-1) : nextMatch(1); }
          if (e.key === 'Escape') { clearSearch(); searchInput.blur(); }
        });
        document.getElementById('searchPrev').onclick = () => nextMatch(-1);
        document.getElementById('searchNext').onclick = () => nextMatch(1);
        document.getElementById('searchClear').onclick = clearSearch;

      } catch (e) {
        console.error('Load error:', e);
        errorEl.textContent = `❌ 加载失败: ${e.message}`; errorEl.style.display = 'block';
        renderAnalysis(CodeAnalyzer.defaultStats(''));
      } finally { loading.style.display = 'none'; }
    }

    document.addEventListener('DOMContentLoaded', loadCode);
  </script>
</body>
</html>
