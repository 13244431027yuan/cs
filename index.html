<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Code Viewer Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.css" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1e1e1e;color:#d4d4d4;padding:16px;line-height:1.5}
    .container{max-width:1400px;margin:0 auto}
    .header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#252526;border-radius:6px;margin-bottom:12px;flex-wrap:wrap;gap:10px}
    .file-info{font-size:14px;color:#9cdcfe;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-info a{color:#569cd6;text-decoration:none}
    .file-info a:hover{text-decoration:underline}
    .actions{display:flex;gap:8px}
    .btn{padding:6px 12px;background:#0e639c;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;transition:background.2s}
    .btn:hover{background:#1177bb}
    .btn:disabled{background:#3c3c3c;cursor:not-allowed;opacity:.6}
    .btn-outline{background:transparent;border:1px solid #0e639c}
    .btn-outline:hover{background:#0e639c20}
    
    .analysis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:12px;background:#252526;padding:12px;border-radius:6px}
    .stat-card{text-align:center;padding:10px;border-radius:4px;background:#1e1e1e;border-left:3px solid #569cd6}
    .stat-card.warning{border-left-color:#dcdcaa}
    .stat-card.danger{border-left-color:#f48771}
    .stat-card.success{border-left-color:#4ec9b0}
    .stat-value{font-size:18px;font-weight:600;color:#fff}
    .stat-label{font-size:11px;color:#888;margin-top:4px}
    .stat-sub{font-size:10px;color:#666;margin-top:2px}
    
    .deps{background:#252526;border-radius:6px;padding:10px 14px;margin-bottom:12px}
    .deps-title{font-size:13px;color:#9cdcfe;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .deps-list{display:flex;flex-wrap:wrap;gap:6px}
    .dep-tag{background:#3c3c3c;padding:4px 10px;border-radius:4px;font-size:12px;color:#ce9178;cursor:pointer}
    .dep-tag:hover{background:#4a4a4a}
    .dep-tag.external{color:#4ec9b0}
    .dep-empty{color:#666;font-size:12px;font-style:italic}
    
    /* 🔍 Fuse 专项分析 - 修复显示 */
    .fuse-analysis{background:#252526;border-radius:6px;padding:12px 14px;margin-bottom:12px}
    .fuse-title{font-size:13px;color:#4ec9b0;margin-bottom:10px;display:flex;align-items:center;gap:6px;font-weight:500}
    .fuse-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
    .fuse-item{background:#1e1e1e;padding:8px 12px;border-radius:4px;font-size:12px}
    .fuse-label{color:#888;margin-bottom:4px}
    .fuse-value{color:#d4d4d4;word-break:break-all}
    .fuse-value.code{font-family:monospace;background:#2d2d2d;padding:2px 6px;border-radius:3px}
    .fuse-value.yes{color:#4ec9b0}
    .fuse-value.no{color:#f48771}
    
    .error{background:#5a1d1d;color:#f48771;padding:12px;border-radius:4px;margin-bottom:12px;display:none;white-space:pre-line}
    .loading{text-align:center;padding:30px;color:#888;display:none}
    
    pre{background:#1e1e1e!important;border-radius:6px!important;margin:0!important;box-shadow:0 2px 8px rgba(0,0,0,.3);max-height:65vh;overflow:auto}
    code{font-size:13px!important}
    .prism-toolbar{top:8px!important;right:8px!important}
    .copy-to-clipboard-button{background:#3c3c3c!important;color:#fff!important;border:none!important;padding:4px 10px!important;border-radius:4px!important;font-size:12px!important;cursor:pointer!important}
    .copy-to-clipboard-button:hover{background:#505050!important}
    .copy-to-clipboard-button[data-copy-state="copy-success"]{background:#388a34!important}
    
    @media(max-width:768px){.header{flex-direction:column;align-items:flex-start}.analysis{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:480px){.analysis{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="file-info" id="fileInfo">🔄 初始化...</div>
      <div class="actions">
        <button class="btn btn-outline" id="toggleAnalysis">🔽 隐藏分析</button>
        <button class="btn" id="openGithub" disabled>GitHub</button>
        <button class="btn" id="copyAll" disabled>复制</button>
      </div>
    </div>

    <!-- 分析面板 - 默认显示 -->
    <div id="analysisPanel">
      <div class="analysis">
        <div class="stat-card"><div class="stat-value" id="statLines">-</div><div class="stat-label">总行数</div></div>
        <div class="stat-card"><div class="stat-value" id="statSize">-</div><div class="stat-label">文件大小</div></div>
        <div class="stat-card warning"><div class="stat-value" id="statComments">-</div><div class="stat-label">注释占比</div><div class="stat-sub" id="commentPercent">0%</div></div>
        <div class="stat-card"><div class="stat-value" id="statFunctions">-</div><div class="stat-label">函数数</div></div>
        <div class="stat-card danger"><div class="stat-value" id="statComplexity">-</div><div class="stat-label">复杂度</div><div class="stat-sub" id="complexityLevel">-</div></div>
        <div class="stat-card"><div class="stat-value" id="statImports">-</div><div class="stat-label">依赖数</div></div>
      </div>

      <!-- 🔍 Fuse 专项分析 -->
      <div class="fuse-analysis" id="fuseBox">
        <div class="fuse-title">🔍 模糊搜索配置检测</div>
        <div class="fuse-grid" id="fuseGrid"></div>
      </div>

      <!-- 依赖列表 -->
      <div class="deps">
        <div class="deps-title">📦 检测到的依赖 <span id="depsCount"></span></div>
        <div class="deps-list" id="depsList"></div>
      </div>
    </div>

    <div class="error" id="errorMsg"></div>
    <div class="loading" id="loading">🔄 加载并分析中...</div>
    <pre class="line-numbers" style="display:none;"><code id="codeBlock" class="language-javascript"></code></pre>
  </div>

  <!-- Prism CDN -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

  <script>
    // ====== 工具函数 ======
    function parseGitHubUrl(url) {
      const blob = url.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/(?:blob|tree)\/([^/]+)\/(.+?)(?:#.*)?$/);
      if (blob) {
        const [_,o,r,ref,p] = blob;
        return { raw:`https://raw.githubusercontent.com/${o}/${r}/${ref}/${p}`, github:url, lang:(p.split('.').pop()||'').toLowerCase()||'plaintext', filename:p.split('/').pop()||'file' };
      }
      const raw = url.match(/^https?:\/\/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)$/);
      if (raw) {
        const [_,o,r,ref,p] = raw;
        return { raw:url, github:`https://github.com/${o}/${r}/blob/${ref}/${p}`, lang:(p.split('.').pop()||'').toLowerCase()||'plaintext', filename:p.split('/').pop()||'file' };
      }
      return null;
    }
    function $(id){ return document.getElementById(id); }
    function getUrlParam(n){ return new URLSearchParams(location.search).get(n); }

    // ====== 分析引擎 - 简化稳定版 ======
    const Analyzer = {
      stats(code) {
        const lines = code.split('\n'), total = lines.length;
        let comments = 0, inBlock = false;
        for (const ln of lines) {
          const t = ln.trim();
          if (!t) continue;
          if (inBlock) { comments++; if (t.includes('*/')) inBlock = false; continue; }
          if (t.startsWith('/*')) { comments++; if (!t.includes('*/')) inBlock = true; continue; }
          if (t.startsWith('//')||t.startsWith('#')||t.startsWith('--')) comments++;
        }
        const bytes = new Blob([code]).size;
        return {
          totalLines: total,
          commentPercent: total ? Math.round(comments/total*100) : 0,
          size: bytes < 1024 ? `${bytes}B` : bytes < 1048576 ? `${(bytes/1024).toFixed(1)}KB` : `${(bytes/1048576).toFixed(2)}MB`
        };
      },
      countFunc(code) {
        const m = code.match(/\bfunction\s+\w+|\b(?:const|let|var)\s+\w+\s*=\s*\(?async?\s*\(|=>\s*\{?|\bdef\s+\w+|\bfunc\s+\w+/g);
        return m ? Math.min(m.length, Math.round(m.length*0.9)) : 0;
      },
      findDeps(code) {
        const deps = new Set();
        // import/require
        (code.match(/(?:import|from|require)\s*[\('"]+([^'"\s)]+)/g)||[]).forEach(s=>{
          const m = s.match(/[^'"\s()]+$/); if (m && !m[0].startsWith('.')) deps.add(m[0]);
        });
        // 特征库
        if (/fuse/i.test(code)) deps.add('fuse.js');
        if (/scratch|extensions\.register|getInfo\(\)/i.test(code)) deps.add('scratch-vm');
        if (/prism/i.test(code)) deps.add('prismjs');
        return Array.from(deps).slice(0,20);
      },
      complexity(code) {
        const kw = ['if','else','for','while','switch','case','catch','&&','||','\\?'];
        let score = 1;
        for (const k of kw) { const m = code.match(new RegExp(`\\b${k}\\b`,'g')); if (m) score += m.length*0.5; }
        let d=0,md=0; for (const c of code) { if (c==='{'||c==='(') { d++; md=Math.max(md,d); } else if (c==='}'||c===')') d=Math.max(0,d-1); }
        score += md*0.7;
        const lvl = score<10?'低':score<25?'中':score<50?'高':'极高';
        const clr = score<10?'#4ec9b0':score<25?'#dcdcaa':score<50?'#ce9178':'#f48771';
        return { score:Math.round(score), level:lvl, color:clr };
      },
      // 🔍 Fuse 配置检测 - 修复版
      detectFuse(code) {
        const r = {};
        // 基础检测
        r.hasFuse = /new\s+Fuse\s*\(/i.test(code) || /Fuse\s*\.version/i.test(code);
        r.isScratchExt = /extensions\.register|getInfo\(\)|opcode/i.test(code);
        // 配置项提取 (更宽松的正则)
        const cfg = {};
        // threshold
        const th = code.match(/threshold\s*[:=]\s*([\d.]+)/i); if (th) cfg.threshold = th[1];
        // keys
        const keys = code.match(/keys\s*[:=]\s*\[([^\]]{0,200})\]/i); if (keys) cfg.keys = keys[1].trim();
        // includeScore
        if (/includeScore\s*[:=]\s*true/i.test(code)) cfg.includeScore = true;
        // minMatchCharLength
        const ml = code.match(/minMatchCharLength\s*[:=]\s*(\d+)/i); if (ml) cfg.minMatch = ml[1];
        // 扩展名称
        const en = code.match(/(?:name|cf_SExtName)\s*[:=]\s*["']([^"']+)["']/i); if (en) cfg.extName = en[1];
        // 关键词参数
        cfg.hasKeyword = /keyword|searchQuery|query|cf_SDefaultKeyword/i.test(code);
        
        if (r.hasFuse || r.isScratchExt || Object.keys(cfg).length) {
          r.config = cfg;
          return r;
        }
        return null;
      },
      analyze(code) {
        const s = this.stats(code);
        return {
          ...s,
          functions: this.countFunc(code),
          imports: this.findDeps(code),
          complexity: this.complexity(code),
          fuse: this.detectFuse(code)
        };
      }
    };

    // ====== 渲染函数 - 修复显示 ======
    function render(data) {
      // 基础统计
      $('statLines').textContent = data.totalLines?.toLocaleString() || '-';
      $('statSize').textContent = data.size || '-';
      $('statComments').textContent = `${data.commentPercent||0}%`;
      $('commentPercent').textContent = `注释行`;
      $('statFunctions').textContent = data.functions ?? '-';
      $('statComplexity').textContent = data.complexity?.score ?? '-';
      const cl = $('complexityLevel');
      cl.textContent = data.complexity?.level || '-';
      cl.style.color = data.complexity?.color || '#888';
      $('statImports').textContent = (data.imports?.length||0).toString();
      
      // 依赖标签
      const dl = $('depsList'), dc = $('depsCount');
      dl.innerHTML = '';
      const deps = data.imports || [];
      dc.textContent = deps.length ? `(${deps.length})` : '(0)';
      if (deps.length) {
        deps.forEach(d => {
          const t = document.createElement('span');
          t.className = `dep-tag${d.includes('/')||d.startsWith('@')?' external':''}`;
          t.textContent = d;
          t.onclick = () => window.open(`https://www.npmjs.com/package/${d.replace('@','').split('/')[0]}`,'_blank');
          dl.appendChild(t);
        });
      } else {
        dl.innerHTML = '<span class="dep-empty">未检测到外部依赖</span>';
      }
      
      // 🔍 Fuse 专项 - 修复：确保元素存在再渲染
      const fb = $('fuseBox'), fg = $('fuseGrid');
      if (!fb || !fg) { console.warn('Fuse elements not found'); return; }
      fg.innerHTML = '';
      
      const fuse = data.fuse;
      if (fuse) {
        const cfg = fuse.config || {};
        const items = [
          {l:'Fuse 库', v:fuse.hasFuse?'✅ 已集成':'❌ 未检测到', c:fuse.hasFuse?'yes':'no'},
          {l:'Scratch 扩展', v:fuse.isScratchExt?'✅ 是':'❌ 否', c:fuse.isScratchExt?'yes':'no'},
          {l:'threshold', v:cfg.threshold||'默认 0.6', code:!!cfg.threshold},
          {l:'搜索 keys', v:cfg.keys||'未配置', code:!!cfg.keys},
          {l:'返回匹配度', v:cfg.includeScore?'✅ 是':'❌ 否', c:cfg.includeScore?'yes':'no'},
          {l:'最小匹配长', v:cfg.minMatch||'默认 1', code:!!cfg.minMatch},
          {l:'扩展名称', v:cfg.extName||'-', code:!!cfg.extName},
          {l:'关键词参数', v:cfg.hasKeyword?'✅ 支持':'❌ 未检测到', c:cfg.hasKeyword?'yes':'no'}
        ];
        items.forEach(it => {
          const div = document.createElement('div');
          div.className = 'fuse-item';
          const valClass = it.c ? `fuse-value ${it.c}` : (it.code?'fuse-value code':'fuse-value');
          div.innerHTML = `<div class="fuse-label">${it.l}</div><div class="${valClass}">${it.v}</div>`;
          fg.appendChild(div);
        });
      } else {
        // 无 Fuse 特征时显示提示
        const div = document.createElement('div');
        div.className = 'fuse-item';
        div.innerHTML = '<div class="fuse-label">检测结果</div><div class="fuse-value no">未检测到模糊搜索配置</div>';
        fg.appendChild(div);
      }
    }

    // ====== 主流程 ======
    async function main() {
      const url = getUrlParam('url');
      const err = $('errorMsg'), load = $('loading'), codeEl = $('codeBlock'), pre = codeEl.parentElement;
      const infoEl = $('fileInfo'), openBtn = $('openGithub'), copyBtn = $('copyAll'), toggleBtn = $('toggleAnalysis');
      const panel = $('analysisPanel');

      if (!url) { err.textContent = '❌ 缺少 url 参数\n示例: ?url=https://github.com/user/repo/blob/main/file.js'; err.style.display='block'; load.style.display='none'; return; }
      
      const info = parseGitHubUrl(url);
      if (!info) { err.textContent = '❌ 不支持的链接格式，仅支持 GitHub blob/raw 链接'; err.style.display='block'; load.style.display='none'; return; }

      // UI 初始化
      infoEl.innerHTML = `📄 <a href="${info.github}" target="_blank">${info.filename}</a>`;
      openBtn.onclick = () => window.open(info.github,'_blank'); openBtn.disabled = false;
      toggleBtn.disabled = false;
      load.style.display = 'block'; pre.style.display = 'none'; panel.style.display = 'block';

      try {
        const res = await fetch(info.raw, {cache:'no-store'});
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const code = await res.text();

        // 代码高亮
        codeEl.textContent = code;
        codeEl.className = `language-${info.lang}`;
        Prism.highlightElement(codeEl);
        if (Prism.plugins.lineNumbers) Prism.plugins.lineNumbers.resize(pre);

        // 执行分析 + 渲染
        const result = Analyzer.analyze(code);
        render(result);

        // 显示代码区
        pre.style.display = 'block';
        copyBtn.disabled = false;
        copyBtn.onclick = async () => {
          try { await navigator.clipboard.writeText(code); copyBtn.textContent='✓'; setTimeout(()=>copyBtn.textContent='复制',1200); }
          catch { alert('复制失败，请手动选择'); }
        };

        // 折叠分析面板
        let visible = true;
        toggleBtn.onclick = () => {
          visible = !visible;
          panel.style.display = visible ? 'block' : 'none';
          toggleBtn.textContent = visible ? '🔽 隐藏分析' : '📊 显示分析';
        };

      } catch (e) {
        console.error('Error:', e);
        err.textContent = `❌ 加载失败: ${e.message}\n\n可能原因:\n• 文件不存在\n• 仓库私有\n• CORS 限制`;
        err.style.display = 'block';
        // 降级渲染
        render(Analyzer.analyze(''));
      } finally {
        load.style.display = 'none';
      }
    }

    // 启动
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', main);
    else main();
  </script>
</body>
</html>
