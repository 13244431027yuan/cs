<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Code Viewer Pro</title>
  <!-- Prism 样式 -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.css" rel="stylesheet"/>
  <!-- Fuse.js 模糊搜索库 -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e; color: #d4d4d4; padding: 16px; line-height: 1.5;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* 头部 */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: #252526; border-radius: 6px;
      margin-bottom: 12px; flex-wrap: wrap; gap: 10px;
    }
    .file-info { font-size: 14px; color: #9cdcfe; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-info a { color: #569cd6; text-decoration: none; }
    .file-info a:hover { text-decoration: underline; }
    .actions { display: flex; gap: 8px; }
    .btn {
      padding: 6px 12px; background: #0e639c; color: white;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
      transition: background 0.2s;
    }
    .btn:hover { background: #1177bb; }
    .btn:disabled { background: #3c3c3c; cursor: not-allowed; opacity: 0.6; }
    .btn-outline { background: transparent; border: 1px solid #0e639c; }
    .btn-outline:hover { background: #0e639c20; }

    /* 搜索框 */
    .search-box {
      display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
    }
    .search-input {
      flex: 1; padding: 10px 14px; background: #252526; border: 1px solid #3c3c3c;
      border-radius: 6px; color: #d4d4d4; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #0e639c; }
    .search-input::placeholder { color: #666; }
    .search-info {
      font-size: 12px; color: #888; min-width: 80px; text-align: right;
    }
    .search-info .match { color: #4ec9b0; }
    .search-clear {
      padding: 8px 12px; background: #3c3c3c; border: none;
      border-radius: 4px; color: #d4d4d4; cursor: pointer; font-size: 13px;
    }
    .search-clear:hover { background: #505050; }

    /* 搜索结果列表 */
    .search-results {
      background: #252526; border-radius: 6px; margin-bottom: 12px;
      max-height: 200px; overflow-y: auto; display: none;
      border: 1px solid #3c3c3c;
    }
    .search-results.show { display: block; }
    .search-item {
      padding: 8px 12px; border-bottom: 1px solid #3c3c3c;
      cursor: pointer; font-size: 13px; display: flex; align-items: center;
      gap: 8px; transition: background 0.15s;
    }
    .search-item:hover { background: #2d2d30; }
    .search-item.active { background: #0e639c30; border-left: 3px solid #0e639c; }
    .search-item .line-num {
      color: #569cd6; font-family: monospace; min-width: 40px;
    }
    .search-item .line-content {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: #d4d4d4;
    }
    .search-item .line-content mark {
      background: #dcdcaa50; color: #dcdcaa; padding: 0 2px;
      border-radius: 2px;
    }
    .search-empty {
      padding: 20px; text-align: center; color: #666; font-size: 13px;
    }

    /* 分析面板 */
    .analysis {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px; margin-bottom: 12px; background: #252526;
      padding: 12px; border-radius: 6px;
    }
    .stat-card {
      text-align: center; padding: 10px; border-radius: 4px;
      background: #1e1e1e; border-left: 3px solid #569cd6;
    }
    .stat-card.warning { border-left-color: #dcdcaa; }
    .stat-card.danger { border-left-color: #f48771; }
    .stat-value { font-size: 18px; font-weight: 600; color: #fff; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
    .stat-sub { font-size: 10px; color: #666; margin-top: 2px; }

    /* 依赖列表 */
    .deps {
      background: #252526; border-radius: 6px; padding: 10px 14px;
      margin-bottom: 12px;
    }
    .deps-title { font-size: 13px; color: #9cdcfe; margin-bottom: 8px; }
    .deps-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .dep-tag {
      background: #3c3c3c; padding: 4px 10px; border-radius: 4px;
      font-size: 12px; color: #ce9178; cursor: pointer;
    }
    .dep-tag:hover { background: #4a4a4a; }
    .dep-tag.external { color: #4ec9b0; }
    .dep-empty { color: #666; font-size: 12px; font-style: italic; }

    /* 错误/加载 */
    .error {
      background: #5a1d1d; color: #f48771; padding: 12px;
      border-radius: 4px; margin-bottom: 12px; display: none;
    }
    .loading { text-align: center; padding: 30px; color: #888; display: none; }

    /* 代码区域 */
    .code-wrapper {
      position: relative; background: #1e1e1e; border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3); overflow: hidden;
    }
    .code-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: #252526; border-bottom: 1px solid #3c3c3c;
    }
    .code-lang { font-size: 12px; color: #888; }
    pre {
      background: #1e1e1e !important; border-radius: 0 !important;
      margin: 0 !important; max-height: 60vh; overflow: auto;
    }
    code { font-size: 13px !important; }
    .prism-toolbar { top: 8px !important; right: 8px !important; }
    .copy-to-clipboard-button {
      background: #3c3c3c !important; color: #fff !important;
      border: none !important; padding: 4px 10px !important;
      border-radius: 4px !important; font-size: 12px !important;
      cursor: pointer !important;
    }
    .copy-to-clipboard-button:hover { background: #505050 !important; }
    .copy-to-clipboard-button[data-copy-state="copy-success"] { background: #388a34 !important; }

    /* 搜索高亮行 */
    .search-highlight {
      background: rgba(220, 220, 170, 0.15) !important;
      border-left: 3px solid #dcdcaa !important;
    }
    .search-match {
      background: #dcdcaa40; color: #dcdcaa; border-radius: 2px;
      padding: 0 2px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .header { flex-direction: column; align-items: flex-start; }
      .analysis { grid-template-columns: repeat(2, 1fr); }
      .search-box { flex-direction: column; }
      .search-input { width: 100%; }
    }
    @media (max-width: 480px) {
      .analysis { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="file-info" id="fileInfo">🔄 初始化...</div>
      <div class="actions">
        <button class="btn btn-outline" id="toggleAnalysis">🔽 隐藏分析</button>
        <button class="btn" id="openGithub" disabled>GitHub</button>
        <button class="btn" id="copyAll" disabled>复制</button>
      </div>
    </div>

    <!-- 搜索框 -->
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" 
             placeholder="🔍 搜索代码 (支持模糊匹配，按 Enter 跳转，↑↓ 导航)" disabled />
      <button class="search-clear" id="searchClear" disabled>✕</button>
      <div class="search-info" id="searchInfo"></div>
    </div>

    <!-- 搜索结果 -->
    <div class="search-results" id="searchResults"></div>

    <!-- 分析面板 -->
    <div id="analysisPanel">
      <div class="analysis">
        <div class="stat-card">
          <div class="stat-value" id="statLines">-</div>
          <div class="stat-label">总行数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statSize">-</div>
          <div class="stat-label">文件大小</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-value" id="statComments">-</div>
          <div class="stat-label">注释占比</div>
          <div class="stat-sub" id="commentPercent">0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statFunctions">-</div>
          <div class="stat-label">函数/方法</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-value" id="statComplexity">-</div>
          <div class="stat-label">复杂度</div>
          <div class="stat-sub" id="complexityLevel">计算中...</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statImports">-</div>
          <div class="stat-label">依赖模块</div>
        </div>
      </div>

      <div class="deps">
        <div class="deps-title">📦 检测到的依赖 <span id="depsCount" style="color:#666;font-size:12px;margin-left:6px"></span></div>
        <div class="deps-list" id="depsList"><span class="dep-empty">分析中...</span></div>
      </div>
    </div>

    <div class="error" id="errorMsg"></div>
    <div class="loading" id="loading">🔄 加载并分析中...</div>
    
    <div class="code-wrapper" style="display:none;" id="codeWrapper">
      <div class="code-header">
        <span class="code-lang" id="codeLang">JavaScript</span>
      </div>
      <pre class="line-numbers"><code id="codeBlock" class="language-javascript"></code></pre>
    </div>
  </div>

  <!-- Prism -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

  <script>
    // ====== 全局状态 ======
    let gCode = '';
    let gLines = [];
    let gFuse = null;
    let gSearchResults = [];
    let gActiveIndex = -1;
    let gAnalysisVisible = true;

    // ====== URL 解析 ======
    function parseGitHubUrl(url) {
      const blobMatch = url.match(/^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/(?:blob|tree)\/([^/]+)\/(.+?)(?:#.*)?$/);
      if (blobMatch) {
        const [_, owner, repo, ref, path] = blobMatch;
        return {
          raw: `https://raw.githubusercontent.com/${owner}/${repo}/${ref}/${path}`,
          github: url,
          lang: path.split('.').pop()?.toLowerCase() || 'plaintext',
          filename: path.split('/').pop() || 'file'
        };
      }
      const rawMatch = url.match(/^https?:\/\/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)$/);
      if (rawMatch) {
        const [_, owner, repo, ref, path] = rawMatch;
        return {
          raw: url,
          github: `https://github.com/${owner}/${repo}/blob/${ref}/${path}`,
          lang: path.split('.').pop()?.toLowerCase() || 'plaintext',
          filename: path.split('/').pop() || 'file'
        };
      }
      return null;
    }

    function getUrlParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    // ====== 模糊搜索引擎 ======
    const SearchEngine = {
      // 初始化 Fuse.js
      init(code) {
        gCode = code;
        gLines = code.split('\n').map((line, i) => ({
          line: i + 1,
          text: line
        }));
        
        gFuse = new Fuse(gLines, {
          keys: ['text'],
          threshold: 0.4,        // 模糊度 0-1，越小越精确
          distance: 100,         // 匹配距离
          minMatchCharLength: 2, // 最小匹配字符
          includeMatches: true,  // 返回匹配位置
          ignoreLocation: true,  // 忽略位置
          findAllMatches: true   // 查找所有匹配
        });
      },

      // 搜索
      search(query) {
        if (!query || query.length < 2) {
          gSearchResults = [];
          return [];
        }
        const results = gFuse.search(query);
        gSearchResults = results.map(r => ({
          line: r.item.line,
          text: r.item.text,
          score: r.score,
          matches: r.matches
        }));
        return gSearchResults;
      },

      // 高亮匹配文本
      highlight(text, matches) {
        if (!matches || matches.length === 0) return text;
        
        let result = '';
        let lastIndex = 0;
        
        for (const match of matches) {
          for (const idx of match.indices) {
            const [start, end] = idx;
            result += this.escapeHtml(text.slice(lastIndex, start));
            result += `<mark class="search-match">${this.escapeHtml(text.slice(start, end + 1))}</mark>`;
            lastIndex = end + 1;
          }
        }
        result += this.escapeHtml(text.slice(lastIndex));
        return result;
      },

      // HTML 转义
      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      },

      // 清除
      clear() {
        gSearchResults = [];
        gActiveIndex = -1;
      }
    };

    // ====== 代码分析引擎 ======
    const CodeAnalyzer = {
      safeAnalyze(code, lang) {
        try { return this.analyze(code, lang); }
        catch (e) { console.warn('Analysis fallback:', e); return this.defaultStats(code); }
      },

      defaultStats(code) {
        const lines = code.split('\n').length;
        const bytes = new Blob([code]).size;
        return {
          totalLines: lines, codeLines: lines, emptyLines: 0, commentLines: 0,
          commentPercent: 0,
          size: bytes < 1024 ? `${bytes} B` : bytes < 1024*1024 ? `${(bytes/1024).toFixed(1)} KB` : `${(bytes/1024/1024).toFixed(2)} MB`,
          functions: 0, imports: [],
          complexity: { score: 0, level: '未知', color: '#888' }
        };
      },

      basicStats(code) {
        const lines = code.split('\n');
        const totalLines = lines.length;
        let commentLines = 0, codeLines = 0, emptyLines = 0;
        let inBlockComment = false;
        
        for (let line of lines) {
          const trimmed = line.trim();
          if (!trimmed) { emptyLines++; continue; }
          if (inBlockComment) {
            commentLines++;
            if (trimmed.includes('*/')) inBlockComment = false;
            continue;
          }
          if (trimmed.startsWith('/*')) {
            commentLines++;
            if (!trimmed.includes('*/')) inBlockComment = true;
            continue;
          }
          if (trimmed.startsWith('//') || trimmed.startsWith('#') || trimmed.startsWith('--')) {
            commentLines++; continue;
          }
          codeLines++;
        }
        
        const bytes = new Blob([code]).size;
        return {
          totalLines, codeLines, emptyLines, commentLines,
          commentPercent: totalLines ? Math.round(commentLines / totalLines * 100) : 0,
          size: bytes < 1024 ? `${bytes} B` : bytes < 1024*1024 ? `${(bytes/1024).toFixed(1)} KB` : `${(bytes/1024/1024).toFixed(2)} MB`
        };
      },

      countFunctions(code, lang) {
        const patterns = {
          javascript: [/\bfunction\s+\w+/g, /\b(?:const|let|var)\s+\w+\s*=\s*(?:async\s*)?\(/g, /=>\s*\{?/g],
          python: [/\bdef\s+\w+/g],
          java: [/\b(?:public|private|protected|\s)\s*\w+\s+\w+\s*\([^)]*\)\s*\{?/g],
          php: [/\bfunction\s+\w+/g],
          go: [/\bfunc\s+(?:\([^)]+\)\s+)?\w+/g],
          rust: [/\bfn\s+\w+/g]
        };
        const regs = patterns[lang] || patterns.javascript;
        let count = 0;
        for (const re of regs) {
          try {
            const matches = code.match(re);
            if (matches) count += matches.length;
          } catch {}
        }
        return Math.min(count, Math.round(count * 0.85)) || 0;
      },

      extractImports(code, lang) {
        const deps = new Set();
        const patterns = {
          javascript: [/(?:import|from)\s+['"]([^'"]+)['"]/g, /require\s*\(\s*['"]([^'"]+)['"]\s*\)/g],
          python: [/^\s*import\s+(\w+)/gm, /^\s*from\s+(\w+)(?:\.\w+)*\s+import/gm],
          php: [/(?:include|require)\s*['"]([^'"]+)['"]/g]
        };
        const regs = patterns[lang] || patterns.javascript;
        for (const re of regs) {
          try {
            let m;
            while ((m = re.exec(code)) !== null) {
              if (m[1] && m[1].trim() && !m[1].startsWith('.')) {
                deps.add(m[1].trim().split(/[\/\s]/)[0]);
              }
            }
          } catch {}
        }
        return Array.from(deps).slice(0, 25);
      },

      estimateComplexity(code) {
        const keywords = ['if', 'else', 'for', 'while', 'switch', 'case', 'catch', '&&', '||', '\\?'];
        let score = 1;
        for (const kw of keywords) {
          try {
            const regex = new RegExp(`\\b${kw}\\b`, 'g');
            const matches = code.match(regex);
            if (matches) score += matches.length * 0.5;
          } catch {}
        }
        let maxDepth = 0, depth = 0;
        for (const ch of code) {
          if (ch === '{' || ch === '(') { depth++; maxDepth = Math.max(maxDepth, depth); }
          else if (ch === '}' || ch === ')') depth = Math.max(0, depth - 1);
        }
        score += maxDepth * 0.7;
        
        const level = score < 10 ? '低' : score < 25 ? '中' : score < 50 ? '高' : '极高';
        const color = score < 10 ? '#4ec9b0' : score < 25 ? '#dcdcaa' : score < 50 ? '#ce9178' : '#f48771';
        return { score: Math.round(score), level, color };
      },

      analyze(code, lang) {
        const basic = this.basicStats(code);
        return {
          ...basic,
          functions: this.countFunctions(code, lang),
          imports: this.extractImports(code, lang),
          complexity: this.estimateComplexity(code)
        };
      }
    };

    // ====== UI 渲染 ======
    function renderAnalysis(data) {
      document.getElementById('statLines').textContent = data.totalLines?.toLocaleString() || '-';
      document.getElementById('statSize').textContent = data.size || '-';
      document.getElementById('statComments').textContent = `${data.commentPercent || 0}%`;
      document.getElementById('commentPercent').textContent = `注释 ${data.commentLines || 0} 行`;
      document.getElementById('statFunctions').textContent = data.functions ?? '-';
      
      const cx = data.complexity || {};
      document.getElementById('statComplexity').textContent = cx.score ?? '-';
      const levelEl = document.getElementById('complexityLevel');
      levelEl.textContent = cx.level || '未知';
      levelEl.style.color = cx.color || '#888';
      
      document.getElementById('statImports').textContent = (data.imports?.length || 0).toString();
      const depsList = document.getElementById('depsList');
      const depsCount = document.getElementById('depsCount');
      depsList.innerHTML = '';
      
      if (data.imports?.length > 0) {
        depsCount.textContent = `(${data.imports.length})`;
        data.imports.forEach(dep => {
          const tag = document.createElement('span');
          tag.className = `dep-tag ${dep.includes('/') || dep.startsWith('@') ? 'external' : ''}`;
          tag.textContent = dep;
          tag.onclick = () => {
            const pkg = dep.replace('@', '').split('/')[0];
            window.open(`https://www.npmjs.com/package/${pkg}`, '_blank');
          };
          depsList.appendChild(tag);
        });
      } else {
        depsCount.textContent = '(0)';
        depsList.innerHTML = '<span class="dep-empty">未检测到外部依赖</span>';
      }
    }

    function renderSearchResults(results, query) {
      const container = document.getElementById('searchResults');
      const infoEl = document.getElementById('searchInfo');
      
      if (results.length === 0) {
        container.innerHTML = '<div class="search-empty">未找到匹配结果</div>';
        container.classList.add('show');
        infoEl.innerHTML = '';
        gActiveIndex = -1;
        return;
      }

      infoEl.innerHTML = `<span class="match">${results.length}</span> 个匹配`;
      
      container.innerHTML = results.slice(0, 50).map((r, i) => `
        <div class="search-item ${i === gActiveIndex ? 'active' : ''}" data-index="${i}" data-line="${r.line}">
          <span class="line-num">L${r.line}</span>
          <span class="line-content">${SearchEngine.highlight(r.text, r.matches)}</span>
        </div>
      `).join('');

      container.classList.add('show');
      gActiveIndex = 0;
      updateActiveItem();
    }

    function updateActiveItem() {
      const items = document.querySelectorAll('.search-item');
      items.forEach((item, i) => {
        item.classList.toggle('active', i === gActiveIndex);
      });
      if (items[gActiveIndex]) {
        items[gActiveIndex].scrollIntoView({ block: 'nearest' });
      }
    }

    function jumpToLine(lineNum) {
      const pre = document.querySelector('pre');
      const lineEl = pre.querySelector(`span[data-line="${lineNum}"]`);
      if (lineEl) {
        // 移除旧高亮
        pre.querySelectorAll('.search-highlight').forEach(el => el.classList.remove('search-highlight'));
        // 添加新高亮
        const lineWrapper = lineEl.closest('div') || lineEl.parentElement;
        if (lineWrapper) {
          lineWrapper.classList.add('search-highlight');
          lineWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      } else {
        // 行号元素未渲染，估算位置
        const lineHeight = 20;
        pre.scrollTop = (lineNum - 1) * lineHeight;
      }
    }

    // ====== 主逻辑 ======
    async function loadCode() {
      const url = getUrlParam('url');
      const errorEl = document.getElementById('errorMsg');
      const loading = document.getElementById('loading');
      const codeBlock = document.getElementById('codeBlock');
      const codeWrapper = document.getElementById('codeWrapper');
      const fileInfo = document.getElementById('fileInfo');
      const openBtn = document.getElementById('openGithub');
      const copyAllBtn = document.getElementById('copyAll');
      const toggleBtn = document.getElementById('toggleAnalysis');
      const analysisPanel = document.getElementById('analysisPanel');
      const searchInput = document.getElementById('searchInput');
      const searchClear = document.getElementById('searchClear');
      const searchResults = document.getElementById('searchResults');

      if (!url) {
        errorEl.textContent = '❌ 缺少 url 参数\n示例: ?url=https://github.com/owner/repo/blob/main/file.js';
        errorEl.style.display = 'block';
        loading.style.display = 'none';
        return;
      }

      const info = parseGitHubUrl(url);
      if (!info) {
        errorEl.textContent = '❌ 不支持的链接格式';
        errorEl.style.display = 'block';
        loading.style.display = 'none';
        return;
      }

      fileInfo.innerHTML = `📄 <a href="${info.github}" target="_blank">${info.filename}</a>`;
      openBtn.onclick = () => window.open(info.github, '_blank');
      openBtn.disabled = false;
      toggleBtn.disabled = false;
      
      loading.style.display = 'block';
      codeWrapper.style.display = 'none';
      analysisPanel.style.display = 'block';

      try {
        const res = await fetch(info.raw, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const code = await res.text();

        // 代码高亮
        codeBlock.textContent = code;
        codeBlock.className = `language-${info.lang}`;
        document.getElementById('codeLang').textContent = info.lang.toUpperCase();
        Prism.highlightElement(codeBlock);
        if (Prism.plugins.lineNumbers) {
          Prism.plugins.lineNumbers.resize(codeBlock.parentElement);
        }

        // 分析
        const analysis = CodeAnalyzer.safeAnalyze(code, info.lang);
        renderAnalysis(analysis);

        // ✅ 初始化搜索
        SearchEngine.init(code);
        searchInput.disabled = false;
        searchClear.disabled = false;

        // 显示
        codeWrapper.style.display = 'block';
        copyAllBtn.disabled = false;

        // 复制
        copyAllBtn.onclick = async () => {
          try {
            await navigator.clipboard.writeText(code);
            copyAllBtn.textContent = '✓';
            setTimeout(() => copyAllBtn.textContent = '复制', 1200);
          } catch { alert('复制失败'); }
        };

        // 切换分析
        toggleBtn.onclick = () => {
          gAnalysisVisible = !gAnalysisVisible;
          analysisPanel.style.display = gAnalysisVisible ? 'block' : 'none';
          toggleBtn.textContent = gAnalysisVisible ? '🔽 隐藏分析' : '📊 显示分析';
        };

        // 🔍 搜索事件
        let searchTimer = null;
        searchInput.addEventListener('input', (e) => {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(() => {
            const query = e.target.value.trim();
            if (query.length < 2) {
              SearchEngine.clear();
              searchResults.classList.remove('show');
              document.getElementById('searchInfo').innerHTML = '';
              // 清除高亮
              document.querySelector('pre')?.querySelectorAll('.search-highlight').forEach(el => {
                el.classList.remove('search-highlight');
              });
              return;
            }
            const results = SearchEngine.search(query);
            renderSearchResults(results, query);
          }, 150);
        });

        // 清除搜索
        searchClear.onclick = () => {
          searchInput.value = '';
          SearchEngine.clear();
          searchResults.classList.remove('show');
          document.getElementById('searchInfo').innerHTML = '';
          document.querySelector('pre')?.querySelectorAll('.search-highlight').forEach(el => {
            el.classList.remove('search-highlight');
          });
          searchInput.focus();
        };

        // 键盘导航
        searchInput.addEventListener('keydown', (e) => {
          if (gSearchResults.length === 0) return;
          
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            gActiveIndex = Math.min(gActiveIndex + 1, gSearchResults.length - 1);
            updateActiveItem();
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            gActiveIndex = Math.max(gActiveIndex - 1, 0);
            updateActiveItem();
          } else if (e.key === 'Enter') {
            e.preventDefault();
            if (gActiveIndex >= 0 && gSearchResults[gActiveIndex]) {
              jumpToLine(gSearchResults[gActiveIndex].line);
              searchResults.classList.remove('show');
            }
          } else if (e.key === 'Escape') {
            searchResults.classList.remove('show');
            searchInput.blur();
          }
        });

        // 点击搜索结果
        searchResults.addEventListener('click', (e) => {
          const item = e.target.closest('.search-item');
          if (item) {
            const line = parseInt(item.dataset.line);
            jumpToLine(line);
            searchResults.classList.remove('show');
          }
        });

      } catch (e) {
        console.error('Load error:', e);
        errorEl.textContent = `❌ 加载失败: ${e.message}`;
        errorEl.style.display = 'block';
        renderAnalysis(CodeAnalyzer.defaultStats(''));
      } finally {
        loading.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', loadCode);
  </script>
</body>
</html>
