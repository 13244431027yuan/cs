<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码预览 + 分析 + 高亮</title>
    <!-- Prism 主题：可替换为 prism-tomorrow / prism-coy / prism-funky 等 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29/themes/prism-tomorrow.min.css">
    <!-- 行号插件样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29/plugins/line-numbers/prism-line-numbers.min.css">
    <style>
        :root { --primary: #0366d6; --bg: #fafafa; --code-bg: #1e1e1e; }
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 950px; margin: 0 auto; padding: 1rem; background: var(--bg); color: #24292e; }
        h2 { margin: 0 0 1rem; }
        .header { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
        input { flex: 1; min-width: 200px; padding: 9px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        button { padding: 9px 18px; background: var(--primary); color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0255b3; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #status { margin: 8px 0; min-height: 1.2em; font-size: 14px; color: #d73a49; }
        
        /* 分析面板 */
        .analysis { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 12px; margin-bottom: 1rem; display: none; }
        .analysis.show { display: block; animation: slideDown 0.2s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .analysis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; font-size: 13px; }
        .analysis-item { background: #f6f8fa; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #eee; }
        .analysis-item .label { color: #666; display: block; font-size: 11px; margin-bottom: 4px; }
        .analysis-item .value { font-weight: 600; color: #1a7f37; }
        .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .tag { background: #e1ecf4; color: #39739d; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        
        /* 代码区域 */
        .code-box { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid #e1e4e8; }
        .code-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #2d2d2d; color: #ccc; font-size: 12px; }
        .code-lang { font-weight: 600; text-transform: uppercase; }
        .code-actions { display: flex; gap: 6px; }
        .code-actions button { padding: 3px 10px; font-size: 11px; background: #444; }
        .code-actions button:hover { background: #555; }
        
        pre.line-numbers { margin: 0 !important; border-radius: 0 !important; background: var(--code-bg) !important; }
        pre.line-numbers code { font-family: ui-monospace, SFMono-Regular, 'Cascadia Code', monospace; font-size: 13px; }
        
        #copyBtn.copied { background: #28a745 !important; }
        
        .footer { margin-top: 1.5rem; font-size: 12px; color: #666; text-align: center; }
        .footer code { background: #eee; padding: 2px 6px; border-radius: 3px; }
        
        /* 加载动画 */
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>✨ 代码预览 · 分析 · 高亮</h2>
    
    <div class="header">
        <input type="text" id="urlInput" placeholder="输入 raw 代码链接，或等待 ?url= 参数自动加载">
        <button id="loadBtn" onclick="fetchCode()">🔍 加载</button>
    </div>
    <div id="status"></div>
    
    <!-- 分析面板 -->
    <div class="analysis" id="analysisPanel">
        <div class="analysis-grid">
            <div class="analysis-item"><span class="label">📏 行数</span><span class="value" id="statLines">-</span></div>
            <div class="analysis-item"><span class="label">🔤 字符</span><span class="value" id="statChars">-</span></div>
            <div class="analysis-item"><span class="label">💾 大小</span><span class="value" id="statSize">-</span></div>
            <div class="analysis-item"><span class="label">⚙️ 函数</span><span class="value" id="statFuncs">-</span></div>
            <div class="analysis-item"><span class="label">💬 注释</span><span class="value" id="statComments">-</span></div>
            <div class="analysis-item"><span class="label">🔗 依赖</span><span class="value" id="statImports">-</span></div>
        </div>
        <div class="tags" id="tagList"></div>
    </div>
    
    <!-- 代码显示 -->
    <div class="code-box" id="codeBox" style="display:none;">
        <div class="code-header">
            <span class="code-lang" id="codeLang">JAVASCRIPT</span>
            <div class="code-actions">
                <button onclick="toggleWrap()">🔁 换行</button>
                <button id="copyBtn" onclick="copyCode()">📋 复制</button>
            </div>
        </div>
        <pre class="line-numbers" id="codePre"><code id="codeDisplay"></code></pre>
    </div>
    
    <div class="footer">
        用法：<code>?url=https://raw.githubusercontent.com/user/repo/main/file.js</code><br>
        支持语言：JS/TS/Python/HTML/CSS/JSON/Markdown/SQL/Go/Rust 等
    </div>

    <!-- Prism 核心 + 常用语言 + 插件 -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29/plugins/line-numbers/prism-line-numbers.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29/plugins/normalize-whitespace/prism-normalize-whitespace.min.js"></script>
    
    <script>
        // 语言映射（URL 扩展名 → Prism 语言 ID）
        const LANG_MAP = {
            js: 'javascript', ts: 'typescript', jsx: 'jsx', tsx: 'tsx',
            py: 'python', html: 'html', htm: 'html', css: 'css',
            json: 'json', md: 'markdown', yml: 'yaml', yaml: 'yaml',
            sh: 'bash', bash: 'bash', sql: 'sql', go: 'go',
            rs: 'rust', java: 'java', c: 'c', cpp: 'cpp', cs: 'csharp',
            php: 'php', rb: 'ruby', swift: 'swift', kt: 'kotlin'
        };

        function getUrlParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function getLanguage(url) {
            const ext = (url.split('.').pop() || '').toLowerCase().split('?')[0];
            return LANG_MAP[ext] || 'plaintext';
        }

        // 📊 代码分析（增强版）
        function analyzeCode(code, lang) {
            const lines = code.split('\n');
            const stats = {
                lines: lines.length,
                chars: code.length,
                size: formatSize(new Blob([code]).size),
                functions: 0,
                comments: '0%',
                imports: []
            };

            if (['javascript','typescript','jsx','tsx'].includes(lang)) {
                stats.functions = (code.match(/\b(function\s+\w+|(\w+)\s*[:=]\s*(async\s*)?\(|async\s+function|\w+\s*=\s*\([^)]*\)\s*=>)/g) || []).length;
                stats.imports = [...new Set(code.match(/(?:import|from|require)\s*['"]([^'"]+)['"]/g)?.map(m => m.match(/['"]([^'"]+)['"]/)[1]) || [])];
                const total = lines.length || 1;
                const commentLines = lines.filter(l => /^\s*\/\/|^\s*\/\*|^\s*\*|^\s*\*\//.test(l)).length;
                stats.comments = Math.round((commentLines / total) * 100) + '%';
            } else if (lang === 'python') {
                stats.functions = (code.match(/^\s*(async\s+)?def\s+\w+/gm) || []).length;
                stats.imports = [...new Set(code.match(/^\s*(import|from)\s+[\w.]+/gm)?.map(m => m.trim().split()[1]) || [])];
                const total = lines.length || 1;
                const commentLines = lines.filter(l => /^\s*#/.test(l)).length;
                stats.comments = Math.round((commentLines / total) * 100) + '%';
            } else if (lang === 'html') {
                stats.functions = (code.match(/<script[^>]*>[\s\S]*?(function|=>)/g) || []).length;
                stats.comments = Math.round((code.match(/<!--[\s\S]*?-->/g)?.join('').length / code.length) * 100) + '%';
            } else {
                stats.comments = '-';
            }
            return stats;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/1024/1024).toFixed(2) + ' MB';
        }

        function renderAnalysis(stats, lang, url) {
            document.getElementById('statLines').textContent = stats.lines.toLocaleString();
            document.getElementById('statChars').textContent = stats.chars.toLocaleString();
            document.getElementById('statSize').textContent = stats.size;
            document.getElementById('statFuncs').textContent = stats.functions;
            document.getElementById('statComments').textContent = stats.comments;
            document.getElementById('statImports').textContent = stats.imports.length || '-';
            document.getElementById('codeLang').textContent = lang.toUpperCase();
            
            const tags = [
                `<span class="tag">${lang.toUpperCase()}</span>`,
                `<span class="tag">${stats.lines > 1000 ? '📚 大文件' : stats.lines > 300 ? '📄 中等' : '📝 轻量'}</span>`
            ];
            if (stats.imports.length) tags.push(`<span class="tag">🔗 ${stats.imports.length} 模块</span>`);
            if (stats.functions !== '-' && stats.functions > 20) tags.push('<span class="tag">⚙️ 高复杂度</span>');
            if (stats.comments !== '-' && parseInt(stats.comments) > 30) tags.push('<span class="tag">💬 注释丰富</span>');
            
            document.getElementById('tagList').innerHTML = tags.join('');
            document.getElementById('analysisPanel').classList.add('show');
        }

        // 应用 Prism 高亮（支持动态语言加载）
        function highlightCode(code, lang) {
            const codeEl = document.getElementById('codeDisplay');
            codeEl.className = `language-${lang}`;
            codeEl.textContent = code; // 先设置文本
            
            // 使用 autoloader 自动加载语言组件后高亮
            if (window.Prism?.plugins?.autoloader) {
                Prism.plugins.autoloader.loadLanguages([lang], () => {
                    Prism.highlightElement(codeEl);
                });
            } else if (window.Prism) {
                Prism.highlightElement(codeEl);
            }
        }

        async function fetchCode(targetUrl) {
            const url = targetUrl || document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');
            const codeBox = document.getElementById('codeBox');
            const loadBtn = document.getElementById('loadBtn');
            const copyBtn = document.getElementById('copyBtn');
            
            if (!url) { status.textContent = '👉 请输入代码链接'; return; }
            
            // UI 状态
            status.innerHTML = '<span class="spinner"></span>加载中...';
            codeBox.style.display = 'none';
            document.getElementById('analysisPanel').classList.remove('show');
            loadBtn.disabled = true;
            copyBtn.classList.remove('copied');
            copyBtn.textContent = '📋 复制';

            try {
                // 尝试直连 + 代理兜底
                let res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) {
                    const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                    res = await fetch(proxy);
                }
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const text = await res.text();
                const lang = getLanguage(url);
                
                // 显示代码 + 高亮
                codeBox.style.display = 'block';
                highlightCode(text, lang);
                
                // 分析统计
                const stats = analyzeCode(text, lang);
                renderAnalysis(stats, lang, url);
                
                status.textContent = '✅ 加载成功';
                
            } catch (e) {
                status.textContent = `❌ 失败: ${e.message}`;
                console.error(e);
            } finally {
                loadBtn.disabled = false;
            }
        }

        async function copyCode() {
            const code = document.getElementById('codeDisplay').textContent;
            const btn = document.getElementById('copyBtn');
            try {
                await navigator.clipboard.writeText(code);
                btn.classList.add('copied');
                btn.textContent = '✓ 已复制';
                setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 复制'; }, 1600);
            } catch {
                // 降级方案
                const ta = document.createElement('textarea');
                ta.value = code;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = '✓ 已复制';
                setTimeout(() => btn.textContent = '📋 复制', 1600);
            }
        }

        function toggleWrap() {
            const pre = document.getElementById('codePre');
            pre.style.whiteSpace = pre.style.whiteSpace === 'pre-wrap' ? 'pre' : 'pre-wrap';
        }

        // 初始化：自动加载 ?url= 参数
        window.addEventListener('DOMContentLoaded', () => {
            const url = getUrlParam('url');
            if (url) {
                document.getElementById('urlInput').value = url;
                fetchCode(url);
            }
            // 支持回车加载
            document.getElementById('urlInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') fetchCode();
            });
        });
    </script>
</body>
</html>
